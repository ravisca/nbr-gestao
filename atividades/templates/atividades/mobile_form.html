<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Atividade | SIGEP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .header-bg {
            background-color: #DC2626;
            color: white;
            padding: 15px 0;
            margin-bottom: 20px;
            border-radius: 0 0 20px 20px;
            position: relative;
        }

        .header-logo {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .form-card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 15px;
        }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
        }

        /* Ajuste para inputs de arquivo ficarem bonitos no celular */
        input[type=file] {
            padding: 10px;
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>

<body>
    {% load static %}

    <div class="header-bg text-center">
        <img src="{% static 'img/logo.png' %}" alt="Logo NBR" class="header-logo">
        <h4>Olá, {{ request.user.first_name|default:request.user.username }}! 👋</h4>
        <small>Vamos registrar a aula de hoje?</small>
    </div>

    <div class="container mb-5">
        <div class="card form-card">
            <div class="card-body p-4">

                {% load crispy_forms_tags %}

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-enviar">
                            🚀 Enviar Relatório
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="/admin/logout/" class="text-danger text-decoration-none">Sair do sistema</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function () {
            $('select').select2({
                theme: 'bootstrap-5',
                width: '100%',
                language: { noResults: function () { return "Não encontrado"; } }
            });
        });
    </script>
</body>

</html>
