<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Atividade | SIGEP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .header-bg {
            background-color: #1a1a2e;
            color: white;
            padding: 25px 0 20px;
            margin-bottom: 25px;
            border-radius: 0 0 25px 25px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header-logo {
            display: block;
            margin: 0 auto 10px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 5px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .form-card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 15px;
        }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
        }

        /* Ajuste para inputs de arquivo ficarem bonitos no celular */
        input[type=file] {
            padding: 10px;
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>

<body>
    {% load static %}

    <div class="header-bg text-center">
        <img src="{% static 'img/logo.png' %}" alt="Logo NBR" class="header-logo">
        <h4 class="mb-1">Olá, {{ request.user.first_name|default:request.user.username }}! 👋</h4>
        <small class="opacity-75">Vamos registrar a aula de hoje?</small>
    </div>

    <div class="container mb-5">
        <div class="card form-card">
            <div class="card-body p-4">

                {% load crispy_forms_tags %}

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-dark btn-enviar">
                            🚀 Enviar Relatório
                        </button>
                    </div>
                </form>

                <div class="d-grid gap-2 mt-2">
                    <form method="post" action="{% url 'admin:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary w-100">
                            <i class="bi bi-box-arrow-right"></i> Sair do sistema
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function () {
            $('select').select2({
                theme: 'bootstrap-5',
                width: '100%',
                language: { noResults: function () { return "Não encontrado"; } }
            });
        });
    </script>
</body>

</html>
